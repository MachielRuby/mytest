<!DOCTYPE html>
<!--
 MindAR multi-target image tracking demo
 20 targets mapped to 6 models (modulo cycling)
-->
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MindAR Multi-Target Demo</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      .example-container {
        overflow: hidden;
        position: absolute;
        width: 100%;
        height: 100%;
      }
      #example-control-overlay {
        position: fixed;
        top: 0;
        right: 0;
        z-index: 9999;
        padding: 10px;
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      #example-control-overlay button {
        padding: 8px 14px;
        font-size: 14px;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      #example-control-overlay button:hover {
        background: #fff;
      }
    </style>

    <script>
      // 6 个模型 URL，20 个 target 按 index % 6 取余匹配
      const MODEL_URLS = [
        "https://fc-user-test.oss-cn-hangzhou.aliyuncs.com/awoAUyKeEPaX/model/104676/F1wnjkKB408wctzzw1WvbXx4dzXWrioloqj8aba9addab.glb",
        "https://fc-user-test.oss-cn-hangzhou.aliyuncs.com/awoAUyKeEPaX/model/104668/F1wojkKB408wctzzw1WvbXx4dzXWriolpoj8a2ea0809f.glb",
        "https://fc-user-test.oss-cn-hangzhou.aliyuncs.com/awoAUyKeEPaX/model/104665/F1wkjkKB408wctzzw1WvbXx4dzXWriolnojd59b69187d.glb",
        "https://fc-user-test.oss-cn-hangzhou.aliyuncs.com/awoAUyKeEPaX/model/104664/F1wjjkKB408wctzzw1WvbXx4dzXWriolloj43cabc32d4.glb",
        "https://fc-user-test.oss-cn-hangzhou.aliyuncs.com/awoAUyKeEPaX/model/104657/F1wljkKB408wctzzw1WvbXx4dzXWriolqnjf0de2cf151.glb",
        "https://fc-user-test.oss-cn-hangzhou.aliyuncs.com/awoAUyKeEPaX/model/104652/F1wmjjKB408wctzzw1WvbXx4dzXWrioljnj293e59f894.glb",
      ];
      const TARGET_COUNT = 20;

      document.addEventListener("DOMContentLoaded", () => {
        const startButton = document.querySelector("#start-button");
        const detectAllButton = document.getElementById("detect-all-button");
        const sceneEl = document.querySelector("a-scene");
        let arReady = false;

        function getArSystem() {
          return sceneEl.systems["mindar-image-system"];
        }

        // 动态创建 a-assets 和 target entity
        const assetsEl = sceneEl.querySelector("a-assets");
        for (let i = 0; i < MODEL_URLS.length; i++) {
          const assetItem = document.createElement("a-asset-item");
          assetItem.setAttribute("id", "model-" + i);
          assetItem.setAttribute("src", MODEL_URLS[i]);
          assetsEl.appendChild(assetItem);
        }

        for (let i = 0; i < TARGET_COUNT; i++) {
          const modelIndex = i % MODEL_URLS.length;
          const targetEntity = document.createElement("a-entity");
          targetEntity.setAttribute("mindar-image-target", "targetIndex: " + i);

          const modelEl = document.createElement("a-gltf-model");
          modelEl.setAttribute("rotation", "0 0 0");
          modelEl.setAttribute("position", "0 0 0");
          modelEl.setAttribute("scale", "0.2 0.2 0.2");
          modelEl.setAttribute("src", "#model-" + modelIndex);
          modelEl.setAttribute("animation-mixer", "");

          targetEntity.appendChild(modelEl);
          sceneEl.appendChild(targetEntity);
        }

        // 监听 AR 就绪事件
        sceneEl.addEventListener("arReady", () => {
          arReady = true;
          console.log("AR is ready!");
          detectAllButton.disabled = false;
        });

        detectAllButton.addEventListener("click", () => {
          if (!arReady) return;
          console.log("detecting all...");
          getArSystem().switchTarget(-1);
        });

        startButton.addEventListener("click", () => {
          console.log("starting AR...");
          getArSystem().start();
          startButton.disabled = true;
          startButton.textContent = "Loading...";
        });
      });
    </script>
  </head>
  <body>
    <div id="example-control-overlay">
      <button id="start-button">Start</button>
      <button id="detect-all-button" disabled>Detect All</button>
    </div>

    <div class="example-container">
      <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; maxTrack: 2; uiLoading: no; uiScanning: no; uiError: no" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets timeout="60000"></a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      </a-scene>
    </div>
  </body>
</html>
